version: "3.8"

services:
  floci:
    image: ghcr.io/floci-io/floci:latest
    container_name: supply-chain-floci
    ports:
      - "4566:4566"
    environment:
      - SERVICES=events,dynamodb,s3,lambda
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - floci-data:/var/lib/floci
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  setup:
    image: amazon/aws-cli:latest
    container_name: supply-chain-setup
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Create EventBridge bus
        aws --endpoint-url=http://floci:4566 events create-event-bus \
          --name supply-chain-bus

        # Create DynamoDB tables
        aws --endpoint-url=http://floci:4566 dynamodb create-table \
          --table-name inventory \
          --attribute-definitions AttributeName=sku_location,AttributeType=S \
          --key-schema AttributeName=sku_location,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST

        aws --endpoint-url=http://floci:4566 dynamodb create-table \
          --table-name demand-signals \
          --attribute-definitions AttributeName=signal_id,AttributeType=S \
          --key-schema AttributeName=signal_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST

        aws --endpoint-url=http://floci:4566 dynamodb create-table \
          --table-name decisions \
          --attribute-definitions AttributeName=decision_id,AttributeType=S \
          --key-schema AttributeName=decision_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST

        # Create S3 bucket for decision archive
        aws --endpoint-url=http://floci:4566 s3 mb s3://supply-chain-decisions

        echo "Setup complete."

volumes:
  floci-data:
